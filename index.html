      min-height: 100vh;
      color: #333;
    }

    .container {

      padding: 20px 16px 60px;

    /* ヘッダー */
    .header {
      text-align: center;
      padding: 40px 20px 28px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #f48fb1, #e91e8c);

      padding: 5px 18px;

      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 24px;

      color: #c2185b;

      margin-bottom: 10px;
    }

    .header h1 em {
      font-size: 34px;

    }

    .header-sub {

    }

    }

    /* スコアバー（上部固定） */
    .score-sticky {
      position: sticky;
      top: 0;
      z-index: 100;
      background: white;
      border-radius: 0 0 18px 18px;
      padding: 12px 20px;
      box-shadow: 0 4px 20px rgba(233,30,140,0.15);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .score-num {
      font-size: 28px;
      font-weight: 900;
      color: #e91e8c;
      min-width: 60px;
      text-align: center;
      line-height: 1;
    }

    .score-num span {
      font-size: 12px;
      font-weight: 400;
      color: #999;
      display: block;
    }

    .score-bar-wrap {
      flex: 1;
    }

    .score-label {
      font-size: 11px;
      color: #999;
      margin-bottom: 5px;
    }

    .score-bar-bg {
      height: 10px;
      background: #fce4ec;
      border-radius: 10px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f48fb1, #e91e8c);

    /* カテゴリー */

      margin-bottom: 24px;
    }

    .category-title {

      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: linear-gradient(135deg, #f48fb1, #e91e8c);
      color: white;
      border-radius: 14px 14px 0 0;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .category-title .icon { font-size: 18px; }

    .category-items {
      background: white;
      border-radius: 0 0 14px 14px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(233,30,140,0.1);
    }

    /* チェックアイテム */
    .check-item {
      display: flex;
      align-items: flex-start;
      padding: 16px 18px;
      border-bottom: 1px solid #fff0f5;
      cursor: pointer;
      transition: background 0.2s;
      gap: 14px;
      position: relative;
    }

    .check-item:last-child {
      border-bottom: none;
    }

    .check-item:hover {
      background: #fff5f8;
    }

    .check-item.checked {
      background: linear-gradient(135deg, #fce4ec, #fff0f5);
    }

    .check-item.checked .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .check-box {
      width: 24px;
      height: 24px;
      border-radius: 8px;
      border: 2px solid #f48fb1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
      transition: all 0.2s;
      background: white;
    }

    .check-item.checked .check-box {
      background: linear-gradient(135deg, #f48fb1, #e91e8c);
      border-color: #e91e8c;
    }

    .check-mark {
      color: white;
      font-size: 14px;
      font-weight: 900;
      opacity: 0;

    .check-item.checked .check-mark {

    .item-content {
      flex: 1;

    .item-num {

      color: #f06292;
      font-weight: 700;

    .item-text {
      font-size: 14px;

      color: #333;
      line-height: 1.6;
      margin-bottom: 4px;

    .item-comment {
      font-size: 11px;
      color: #aaa;
      line-height: 1.6;
      display: none;
    }

    .check-item.checked .item-comment {
      display: block;
      color: #f06292;

    .result-title {

    .result-desc {

    .result-point {

      border-radius: 14px;
      padding: 18px;
      text-align: left;

      font-size: 11px;
      font-weight: 700;
      color: #e91e8c;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .result-point p {
      font-size: 14px;
      font-weight: 700;
      color: #333;
      line-height: 1.8;

    /* リセットボタン */

      margin-top: 18px;

      background: white;
      border: 2px solid #f48fb1;
      color: #e91e8c;

let checkedItems = {};

function renderChecklist() {
  const container = document.getElementById('checklist');
  let globalNum = 0;

  categories.forEach(cat => {
    const section = document.createElement('div');
    section.className = 'category-section';

    const title = document.createElement('div');
    title.className = 'category-title';
    title.innerHTML = `<span class="icon">${cat.icon}</span>${cat.title}`;
    section.appendChild(title);

    const itemsWrap = document.createElement('div');
    itemsWrap.className = 'category-items';

    cat.items.forEach(item => {
      globalNum++;
      const id = `item-${globalNum}`;
      checkedItems[id] = false;

      const div = document.createElement('div');
      div.className = 'check-item';
      div.id = id;
      div.onclick = () => toggleItem(id);

      div.innerHTML = `
        <div class="check-box">
          <span class="check-mark">✓</span>
        </div>
        <div class="item-content">
          <div class="item-num">No.${String(globalNum).padStart(2, '0')}</div>
          <div class="item-text">${item.text}</div>
          <div class="item-comment">💡 ${item.comment}</div>
        </div>
      `;

      itemsWrap.appendChild(div);
    });

    section.appendChild(itemsWrap);
    container.appendChild(section);
  });
}

function toggleItem(id) {
  checkedItems[id] = !checkedItems[id];
  const el = document.getElementById(id);
  el.classList.toggle('checked', checkedItems[id]);
  updateScore();
}

function updateScore() {
  const count = Object.values(checkedItems).filter(Boolean).length;
  document.getElementById('score-display').textContent = count;
  document.getElementById('score-bar').style.width = (count / 30 * 100) + '%';
}

      point: "今すぐ「彼から連絡が来ない日=自分の時間を楽しむ日」に決めること。彼中心の時間配分を変えるだけで、気持ちの余裕が生まれます。"

      badge: "LEVEL 4",
      title: "追う女・重症タイプ",
      desc: `かなり多くの項目が当てはまりましたね。でも、正直に向き合えたあなたは本当にすごい。\n\n「変わりたい」と思っているから、ちゃんとチェックできた。追う女になってしまうのは「愛されたい・嫌われたくない」という純粋な気持ちから。その気持ちは何も悪くない。ただ、今のやり方では逆効果になってしまっています。`,
      point: "まず1つだけやめること。今日から「彼に追撃LINEを送らない」だけを徹底する。それだけで3日後に何かが変わり始めます。"
    };
  }

  area.innerHTML = `
    <span class="result-emoji">${result.emoji}</span>
    <div class="result-badge">${result.badge}</div>
    <div class="result-score-big">${count}<span> / 30</span></div>
    <div class="result-title">${result.title}</div>
    <div class="result-desc"><p>${result.desc.replace(/\n/g, '<br>')}</p></div>
    <div class="result-point">
      <div class="pt-label">📌 今すぐやること</div>
      <p>${result.point}</p>
    </div>
    <button class="reset-btn" onclick="resetAll()">もう一度チェックする</button>
  `;

  area.classList.add('show');
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function resetAll() {
  Object.keys(checkedItems).forEach(id => {
    checkedItems[id] = false;
    const el = document.getElementById(id);
    if (el) el.classList.remove('checked');
  });
  updateScore();
  document.getElementById('result-area').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderChecklist();
</script>
</body>
</html>
